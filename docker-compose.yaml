version: '3.8'
services:
  mysqldb:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=rest
    volumes:
      - data:/var/lib/mysql
    ports:
      - "3307:3306"
  app:
    depends_on:
      - mysqldb
    build: .
    restart: always
    ports:
      - "80:80"
    environment:
      SPRING_APPLICATION_JSON: '{
       "spring.datasource.url":"jdbc:mysql://mysqldb:3306/rest",
       "spring.datasource.username" : "root",
       "spring.datasource.password" : "root"
      }'
    tty: true
volumes:
  data: