spring:
  datasource:
    url: jdbc:h2:file:~/rest
  main:
    allow-circular-references: true
  flyway:
    locations:
      - classpath:db/migration
  h2:
    console:
      path: /h2-console
      settings:
        web-allow-others: true
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none

    properties:
      hibernate:
        format_sql: true
server:
  port: 80
logging:
  level:
    org:
      hibernate:
        SQL: debug
        type: trace

